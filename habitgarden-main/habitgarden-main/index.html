<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Habit Garden</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>Habit Garden</h1>
      </header>

      <main id="homeScreen" class="screen active" aria-label="ホーム">
        <section id="habitList" class="habit-list"></section>
      </main>

      <main id="calendarScreen" class="screen" aria-label="カレンダー">
        <h2 id="calendarTitle">カレンダー</h2>
        <div class="calendar-weekdays" aria-hidden="true">
          <span>日</span>
          <span>月</span>
          <span>火</span>
          <span>水</span>
          <span>木</span>
          <span>金</span>
          <span>土</span>
        </div>
        <section id="calendarGrid" class="calendar-grid"></section>
        <section id="calendarDetail" class="calendar-detail"></section>
      </main>

      <main id="shelfScreen" class="screen" aria-label="棚">
        <h2>棚</h2>
        <p class="screen-note">先月までの植物たち</p>
        <section id="shelfList" class="shelf-list"></section>
      </main>

      <nav class="bottom-nav">
        <button data-screen="home" class="nav-btn active">ホーム</button>
        <button data-screen="calendar" class="nav-btn">カレンダー</button>
        <button data-screen="shelf" class="nav-btn">棚</button>
      </nav>
    </div>

    <template id="habitCardTemplate">
      <article class="habit-card">
        <h3 class="habit-name"></h3>
        <div class="plant-wrap">
          <div class="sparkles" aria-hidden="true"></div>
          <img class="plant" alt="" />
        </div>
        <p class="status"></p>
        <button class="energy-btn">記録する</button>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
