<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Habit Garden</title><style>:root{--bg:#f8faf8;--card:#fff;--text:#2d3a30;--muted:#7e8e82;--accent:#74b582;--accent-soft:#e8f5eb;--shadow:0 8px 24px rgba(48,72,54,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif}.app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding:16px 16px 90px}.topbar h1{text-align:center;font-size:1.4rem}.screen{display:none}.screen.active{display:block}.habit-list,.shelf-list{display:grid;gap:14px}.habit-card,.calendar-detail,.shelf-block{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow)}.habit-name{margin:0;font-size:1.1rem}.plant-wrap{min-height:150px;display:grid;place-items:center}.plant{font-size:5rem;transition:transform .45s ease}.plant.bounce{transform:translateY(-5px) scale(1.05)}.status{color:var(--muted);min-height:2.5em}.energy-btn{border:0;width:100%;border-radius:999px;padding:11px;background:var(--accent);color:white;font-weight:600}.energy-btn:disabled{background:#d8e6db;color:#708076}.screen h2{text-align:center}.screen-note{text-align:center;color:var(--muted)}.calendar-weekdays,.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}.calendar-weekdays{margin:14px 0 6px;color:var(--muted);font-size:.78rem;text-align:center}.calendar-day{min-height:54px;border-radius:12px;background:#fff;box-shadow:var(--shadow);padding:7px 5px;cursor:pointer}.calendar-day.blank{background:transparent;box-shadow:none;cursor:default}.calendar-day.today{outline:2px solid var(--accent);outline-offset:-2px}.calendar-day.selected{background:var(--accent-soft)}.calendar-date{font-size:.78rem;font-weight:600}.calendar-marks{display:flex;flex-wrap:wrap;gap:3px;margin-top:9px}.calendar-mark{width:8px;height:8px;border-radius:50%;background:var(--accent)}.calendar-mark.reading{background:#8b6f47}.calendar-mark.exercise{background:#6f9f74}.calendar-mark.python{background:#8066b3}.calendar-detail{margin-top:14px}.calendar-detail h3{margin:0 0 4px;font-size:1rem}.calendar-summary{margin:0 0 10px;color:var(--muted);font-size:.85rem}.calendar-detail-list{list-style:none;margin:0;padding:0;display:grid;gap:8px}.calendar-detail-list li{display:flex;justify-content:space-between;border-radius:10px;background:#f7faf7;padding:9px 10px}.shelf-row{display:flex;gap:8px;overflow-x:auto}.shelf-item{min-width:96px;text-align:center;background:linear-gradient(#fff,#f7f7f1);border-radius:12px;padding:8px}.shelf-plant{font-size:2.5rem}.shelf-date{color:var(--muted);font-size:.75rem}.bottom-nav{position:fixed;max-width:430px;width:calc(100% - 32px);left:50%;transform:translateX(-50%);bottom:12px;background:#fff;border-radius:16px;box-shadow:var(--shadow);display:flex;padding:6px;gap:6px}.nav-btn{flex:1;border:0;padding:10px;border-radius:12px;background:transparent;color:var(--muted);font-weight:600}.nav-btn.active{background:var(--accent-soft);color:#3f6e4b}</style></head><body><div class="app"><header class="topbar"><h1>Habit Garden</h1></header><main id="homeScreen" class="screen active"><section id="habitList" class="habit-list"></section></main><main id="calendarScreen" class="screen"><h2 id="calendarTitle">カレンダー</h2><div class="calendar-weekdays"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div><section id="calendarGrid" class="calendar-grid"></section><section id="calendarDetail" class="calendar-detail"></section></main><main id="shelfScreen" class="screen"><h2>棚</h2><p class="screen-note">先月までの植物たち</p><section id="shelfList" class="shelf-list"></section></main><nav class="bottom-nav"><button data-screen="home" class="nav-btn active">ホーム</button><button data-screen="calendar" class="nav-btn">カレンダー</button><button data-screen="shelf" class="nav-btn">棚</button></nav></div><template id="habitCardTemplate"><article class="habit-card"><h3 class="habit-name"></h3><div class="plant-wrap"><div class="plant"></div></div><p class="status"></p><button class="energy-btn">記録する</button></article></template><script>const habits=[{id:'reading',name:'読書',plant:'coffee'},{id:'exercise',name:'運動',plant:'haworthia'},{id:'python',name:'Python',plant:'orchid'}];const MAX=30,storeKey='habit-garden-v1';const stages={coffee:['🌱','🪴','☕','🌿','🌳'],haworthia:['🌱','🪴','🌵','🌵','🌵'],orchid:['🌱','🪴','🌿','🌸','💎']};const state=loadState();rotateMonthIfNeeded(state);saveState();const habitList=document.getElementById('habitList'),calendarTitle=document.getElementById('calendarTitle'),calendarGrid=document.getElementById('calendarGrid'),calendarDetail=document.getElementById('calendarDetail'),shelfList=document.getElementById('shelfList'),template=document.getElementById('habitCardTemplate');let selectedDayKey=getDayKey(new Date());render();function render(){renderHabits();renderCalendar();renderShelf()}function renderHabits(){const now=new Date(),nowKey=getDayKey(now),monthKey=getMonthKey(now);habitList.innerHTML='';habits.forEach(h=>{const monthData=state.current[monthKey]??(state.current[monthKey]={});const days=monthData[h.id]??(monthData[h.id]=[]);const done=days.includes(nowKey);const node=template.content.firstElementChild.cloneNode(true);node.querySelector('.habit-name').textContent=h.name;node.querySelector('.plant').textContent=getPlant(h.plant,days.length);node.querySelector('.status').textContent=done?'今日の記録は完了しました。':'今日はまだ記録していません。';const btn=node.querySelector('.energy-btn');btn.disabled=done;if(done)btn.textContent='今日の分は記録済み';btn.addEventListener('click',()=>{days.push(nowKey);selectedDayKey=nowKey;saveState();const plant=node.querySelector('.plant');plant.classList.add('bounce');setTimeout(()=>plant.classList.remove('bounce'),420);setTimeout(render,500)});habitList.appendChild(node)})}function renderCalendar(){const now=new Date(),monthKey=getMonthKey(now),[year,month]=monthKey.split('-').map(Number),first=new Date(year,month-1,1),last=new Date(year,month,0),monthData=state.current[monthKey]||{},todayKey=getDayKey(now);calendarTitle.textContent=`${year}年${month}月`;calendarGrid.innerHTML='';for(let i=0;i<first.getDay();i++){const blank=document.createElement('div');blank.className='calendar-day blank';calendarGrid.appendChild(blank)}for(let day=1;day<=last.getDate();day++){const dayKey=formatLocalDate(new Date(year,month-1,day));const completed=habits.filter(h=>(monthData[h.id]||[]).includes(dayKey));const cell=document.createElement('article');cell.className='calendar-day';if(dayKey===todayKey)cell.classList.add('today');if(dayKey===selectedDayKey)cell.classList.add('selected');cell.tabIndex=0;cell.innerHTML=`<div class="calendar-date">${day}</div><div class="calendar-marks"></div>`;const marks=cell.querySelector('.calendar-marks');completed.forEach(h=>{const mark=document.createElement('span');mark.className=`calendar-mark ${h.id}`;mark.title=h.name;marks.appendChild(mark)});cell.addEventListener('click',()=>{selectedDayKey=dayKey;renderCalendar()});calendarGrid.appendChild(cell)}renderCalendarDetail(monthKey)}function renderCalendarDetail(monthKey){const monthData=state.current[monthKey]||{},d=parseDayKey(selectedDayKey);const count=habits.filter(h=>(monthData[h.id]||[]).includes(selectedDayKey)).length;calendarDetail.innerHTML=`<h3>${d.getMonth()+1}月${d.getDate()}日の記録</h3><p class="calendar-summary">${count}/${habits.length} 件完了</p>`;const list=document.createElement('ul');list.className='calendar-detail-list';habits.forEach(h=>{const done=(monthData[h.id]||[]).includes(selectedDayKey);const item=document.createElement('li');item.className=done?'done':'missed';item.innerHTML=`<span>${h.name}</span><strong aria-label="${done?'完了':'未実行'}">${done?'🌱':'-'}</strong>`;list.appendChild(item)});calendarDetail.appendChild(list)}function renderShelf(){shelfList.innerHTML='';habits.forEach(h=>{const block=document.createElement('section');block.className='shelf-block';block.innerHTML=`<h3>${h.name}</h3>`;const row=document.createElement('div');row.className='shelf-row';const entries=Object.entries(state.archive[h.id]||{}).sort((a,b)=>b[0].localeCompare(a[0]));if(!entries.length)row.innerHTML='<p class="status">まだ棚に植物はありません。</p>';else entries.forEach(([month,count])=>{const item=document.createElement('div');item.className='shelf-item';item.innerHTML=`<div class="shelf-plant">${getPlant(h.plant,count)}</div><div class="shelf-date">${month}</div>`;row.appendChild(item)});block.appendChild(row);shelfList.appendChild(block)})}function getPlant(plant,days){return stages[plant][getStage(days)]}function getStage(days){if(days>=MAX)return 4;if(days>=22)return 3;if(days>=15)return 2;if(days>=8)return 1;return 0}function getDayKey(date){const local=new Date(date);if(local.getHours()<6)local.setDate(local.getDate()-1);return formatLocalDate(local)}function getMonthKey(date){const local=new Date(date);if(local.getHours()<6)local.setDate(local.getDate()-1);return formatLocalMonth(local)}function formatLocalDate(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`}function formatLocalMonth(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`}function parseDayKey(key){const [y,m,d]=key.split('-').map(Number);return new Date(y,m-1,d)}function rotateMonthIfNeeded(s){const monthKey=getMonthKey(new Date());for(const key of Object.keys(s.current)){if(key!==monthKey){habits.forEach(h=>{const count=(s.current[key][h.id]||[]).length;s.archive[h.id]=s.archive[h.id]||{};s.archive[h.id][key]=count});delete s.current[key]}}}function loadState(){const parsed=JSON.parse(localStorage.getItem(storeKey)||'{}');return{current:{},archive:{},...parsed}}function saveState(){rotateMonthIfNeeded(state);localStorage.setItem(storeKey,JSON.stringify(state))}document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const s=btn.dataset.screen;document.getElementById('homeScreen').classList.toggle('active',s==='home');document.getElementById('calendarScreen').classList.toggle('active',s==='calendar');document.getElementById('shelfScreen').classList.toggle('active',s==='shelf')}));</script></body></html>
