<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Habit Garden</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>Habit Garden</h1>
      </header>

      <main id="homeScreen" class="screen active" aria-label="ホーム">
        <section id="habitList" class="habit-list"></section>
      </main>

      <main id="shelfScreen" class="screen" aria-label="棚">
        <h2>棚</h2>
        <p class="screen-note">先月までの植物たち</p>
        <section id="shelfList" class="shelf-list"></section>
      </main>

      <main id="calendarScreen" class="screen" aria-label="カレンダー">
        <h2>カレンダー</h2>
        <p class="screen-note">今月の歩みを、そっと振り返りましょう。</p>

        <section class="calendar-card" aria-label="月間カレンダー">
          <div class="calendar-head">
            <button id="prevMonthBtn" class="month-btn" aria-label="前の月">‹</button>
            <p id="calendarMonthLabel" class="calendar-month-label"></p>
            <button id="nextMonthBtn" class="month-btn" aria-label="次の月">›</button>
          </div>
          <div class="calendar-weekdays" aria-hidden="true"></div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <section id="dayDetail" class="day-detail" aria-live="polite"></section>
      </main>

      <nav class="bottom-nav">
        <button data-screen="home" class="nav-btn active">ホーム</button>
        <button data-screen="shelf" class="nav-btn">棚</button>
        <button data-screen="calendar" class="nav-btn">カレンダー</button>
      </nav>
    </div>

    <template id="habitCardTemplate">
      <article class="habit-card">
        <h3 class="habit-name"></h3>
        <div class="plant-wrap">
          <div class="sparkles" aria-hidden="true"></div>
          <div class="plant" aria-hidden="true"></div>
        </div>
        <p class="status"></p>
        <button class="energy-btn">✨ エネルギーを与える</button>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
